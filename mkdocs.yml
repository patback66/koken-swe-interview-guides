site_name: Koken SWE Interview Guides
site_description: Software engineering interview prep guides — behavioral, system design, and coding
site_url: https://patback66.github.io/koken-swe-interview-guides/
repo_url: https://github.com/patback66/koken-swe-interview-guides
repo_name: patback66/koken-swe-interview-guides
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Guides:
    - Overview: guides/index.md
    - Sr. SWE, FinTech:
      - Study Guide: guides/sr-swe-fintech/index.md
      - 48-Hour Cram Plan: guides/sr-swe-fintech/cram-plan.md
      - Behavioral & Past Experience: guides/sr-swe-fintech/01-behavioral-past-experience.md
      - System Design: guides/sr-swe-fintech/02-system-design.md
      - Coding & Technical Depth: guides/sr-swe-fintech/03-coding-technical-depth.md
      - References: guides/sr-swe-fintech/references.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/patback66/koken-swe-interview-guides
